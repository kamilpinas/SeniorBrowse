<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SeniorBrowse</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --sw-bg:             #f5ede0;
        --sw-surface:        #fdf9f4;
        --sw-surface-raised: #ffffff;
        --sw-surface-edge:   #c8b49a;   /* was #e5d8c5 — visible tile borders */
        --sw-surface-edge-mid: #a89078; /* was #d4c4ae */

        --sw-text:           #1c1814;
        --sw-text-muted:     #3a2a1c;   /* was #7a6555 — ~10:1 on bg */
        --sw-text-subtle:    #5e4030;   /* was #b09880 — ~6:1  */

        --sw-accent:         #9c3520;   /* terracotta clay — less amber, still warm */
        --sw-accent-strong:  #7a2614;
        --sw-accent-light:   #f5e0d4;
        --sw-accent-xlight:  #fdf0eb;
        --sw-accent-fg:      #ffffff;

        /* Solid fill for buttons / banners */
        --sw-accent-btn:       #9c3520;
        --sw-accent-btn-hover: #7a2614;

        --sw-success:        #1e6e4a;   /* was #2a7d5a */

        --sw-danger:         #b82020;   /* was #c62828 */
        --sw-danger-light:   #fce4ec;

        --sw-radius:         14px;
        --sw-radius-sm:      8px;
        --sw-radius-lg:      20px;

        --sw-shadow-sm: 0 2px 8px  rgba(28, 24, 20, 0.08),
                        0 1px 2px  rgba(28, 24, 20, 0.04);
        --sw-shadow-md: 0 4px 20px rgba(28, 24, 20, 0.10),
                        0 2px 6px  rgba(28, 24, 20, 0.06);
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--sw-bg);
        color: var(--sw-text);
        font-family: 'Outfit', ui-sans-serif, system-ui, -apple-system,
          'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-size: 18px;
        -webkit-font-smoothing: antialiased;
      }

      #root { height: 100%; }

      @keyframes sw-shake {
        0%,  100% { transform: translateX(0); }
        20%, 60%  { transform: translateX(-8px); }
        40%, 80%  { transform: translateX(8px); }
      }

      @keyframes sw-toast-in {
        from { opacity: 0; transform: scale(0.82); }
        to   { opacity: 1; transform: scale(1); }
      }

      @keyframes sw-toast-out {
        from { opacity: 1; transform: scale(1); }
        to   { opacity: 0; transform: scale(0.88); }
      }

      /* ── Dark theme ─────────────────────────────────── */

      :root.dark {
        --sw-bg:               #161210;
        --sw-surface:          #221c16;   /* was #1e1a15 */
        --sw-surface-raised:   #2e261e;   /* was #27221c */
        --sw-surface-edge:     #50402e;   /* was #362e25 — clearly visible */
        --sw-surface-edge-mid: #6a5440;   /* was #48402f */

        --sw-text:             #f5f0e8;   /* was #f0ebe2 */
        --sw-text-muted:       #dcc4a4;   /* was #c0a88e */
        --sw-text-subtle:      #b09878;   /* was #8a7060 — ~5.5:1 on bg */

        --sw-accent:           #9c3520;
        --sw-accent-btn-hover: #7a2614;
        --sw-accent-light:     #3c1e12;
        --sw-accent-xlight:    #2a140a;
        --sw-accent-fg:        #ffffff;

        /* Darker fills so solid buttons/banners aren't blinding in dark mode */
        --sw-accent-btn:       #9c3520;
        --sw-accent-btn-hover: #7a2614;

        --sw-success:          #48c484;   /* was #3aaa72 */

        --sw-danger:           #f58080;   /* was #f07070 */
        --sw-danger-light:     #3a0e0e;

        --sw-shadow-sm: 0 2px 8px  rgba(0,0,0,0.48), 0 1px 2px rgba(0,0,0,0.28);
        --sw-shadow-md: 0 4px 20px rgba(0,0,0,0.52), 0 2px 6px rgba(0,0,0,0.32);
      }

      :root.dark body { background: var(--sw-bg); }

      :focus-visible {
        outline: 2.5px solid var(--sw-accent);
        outline-offset: 2px;
      }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: var(--sw-surface-edge);
        border-radius: 9999px;
      }

      /* Respect system reduced-motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
