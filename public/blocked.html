<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/brand/favicon.svg" />
  <title>Page blocked — SeniorBrowse</title>

  <!-- Outfit body, Instrument Serif accent (mirrors src/newtab/index.html) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/blocked.css" />
</head>
<body>
  <main class="card">
    <img
      class="illustration"
      src="/brand/illustration-blocked-safely.svg"
      alt=""
      aria-hidden="true"
    />

    <h1>This page is <em>not available</em></h1>
    <p>Your caregiver has chosen to keep this website closed for now.</p>

    <div class="url-box" id="url-display"></div>

    <p class="small">If you think this was a mistake, ask your caregiver to check the settings.</p>

    <button id="back-btn" type="button">Go back</button>

    <div class="stamp">
      <img src="/brand/stamp-protected.svg" alt="Protected by SeniorBrowse" />
    </div>
  </main>

  <script src="blocked.js"></script>
</body>
</html>
