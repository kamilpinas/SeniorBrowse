# Supabase CLI configuration.
# Docs: https://supabase.com/docs/guides/cli/config
#
# Only the settings that matter for this project are pinned here; the CLI fills
# defaults for everything else.

project_id = "xcthxnqldravnuyyapzh"

# ── Edge Functions ───────────────────────────────────────────────────────────
# This endpoint is INTENTIONALLY PUBLIC. The extension calls check-url with no
# Supabase JWT. It protects itself via per-IP rate limiting and input validation.
#
# verify_jwt MUST stay false. If it is true, Supabase's gateway rejects every
# header-less call with 401 "Missing authorization header" before the function
# code runs. The CLI defaults verify_jwt to TRUE, so pinning it here prevents a
# routine `supabase functions deploy` from silently breaking Safe Browsing checks.

[functions.check-url]
verify_jwt = false
